name: Feature request
description: Propose a small, scoped improvement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true for analysts, RCM teams, or maintainers after this ships?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This does not add telemetry or analytics.
          required: true
        - label: This does not require a backend, account, or paid API key.
          required: true
        - label: This only consumes public CMS or other documented public sources.
          required: true
