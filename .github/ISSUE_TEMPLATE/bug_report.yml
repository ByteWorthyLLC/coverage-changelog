name: Bug report
description: Report a reproducible problem in coverage-changelog.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the URL (with query params), browser, and which view tab you were on.
    validations:
      required: true
  - type: textarea
    id: artifact
    attributes:
      label: Affected artifact
      description: Which build artifact, if any, exhibits the issue (e.g. `data/feed.json`, `briefs/latest.html`, `feeds/palmetto-gba.rss.xml`).
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Local verification
      description: Paste output from `npm run check` if you ran it.
    validations:
      required: false
